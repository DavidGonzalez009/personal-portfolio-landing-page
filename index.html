<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles.css" class="stylesheet" />
  </head>

  <body>
    <header>
      <nav>
        <ul class="nav-links">
          <li><a href="#">Home</a></li>
          <li><a href="#">Case Studies</a></li>
          <li><a href="#">Testimonials</a></li>
          <li><a href="#">Recent Work</a></li>
          <li><a href="#">Get In Touch</a></li>
        </ul>

        <div class="social-icons">
          <img src="images/linkedin.svg" alt="LinkedIn" />
          <img src="images/behance.svg" alt="Behance" />
          <img src="images/twitter.svg" alt="Twitter" />
        </div>
      </nav>
    </header>

    <section class="hero">
      <div class="hero-text">
        <h1>David Gonzalez</h1>
        <h2>Front-End Developer & Creative Brand Builder</h2>
        <p>
          I build responsive websites and digital experiences that blend clean
          code, thoughtful design, and creative storytelling.
        </p>
        <a href="#" class="btn">View My Projects</a>
      </div>

      <div class="hero-image">
        <img src="images/profile.jpg" alt="David Gonzalez profile image" />
      </div>
    </section>
    <section class="brands">
      <p>Worked with</p>

      <div class="brand-logos">
        <div class="brand-box">
          <img src="images/clickup.svg" alt="ClickUp" />
        </div>
        <div class="brand-box">
          <img src="images/dropbox.svg" alt="Dropbox" />
        </div>
        <div class="brand-box">
          <img src="images/paycheck.svg" alt="PayCheck" />
        </div>
        <div class="brand-box">
          <img src="images/Elastic.svg" alt="Elastic" />
        </div>
        <div class="brand-box">
          <img src="images/stripe.svg" alt="Stripe" />
        </div>
      </div>
    </section>
  </body>
</html>
